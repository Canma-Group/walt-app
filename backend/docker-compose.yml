version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qris_payment_db
    environment:
      POSTGRES_USER: qris_user
      POSTGRES_PASSWORD: qris_password_dev
      POSTGRES_DB: qris_payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qris_user -d qris_payments"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
