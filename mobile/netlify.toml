[build]
  command = "flutter build web --release"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "3.19.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[dev]
  framework = "flutter"
  command = "flutter run -d web --web-port 8888 --web-hostname 0.0.0.0"
  targetPort = 8888
  port = 8888
  publish = "build/web"
  autoLaunch = true
